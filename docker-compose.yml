version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/chunks_cache.json:/app/chunks_cache.json

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend